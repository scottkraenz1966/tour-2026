<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0071e3"/>
  <!-- rear wheel -->
  <circle cx="27" cy="64" r="15" fill="none" stroke="white" stroke-width="5.5"/>
  <!-- front wheel -->
  <circle cx="73" cy="64" r="15" fill="none" stroke="white" stroke-width="5.5"/>
  <!-- main frame: BB to rear dropout, and seat tube up to seat cluster -->
  <polyline points="27,64 43,35 60,35 73,64" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- seat tube to bottom bracket -->
  <line x1="49" y1="64" x2="43" y2="35" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- saddle -->
  <line x1="36" y1="31" x2="50" y2="31" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- handlebar -->
  <line x1="64" y1="29" x2="74" y2="29" stroke="white" stroke-width="5" stroke-linecap="round"/>
</svg>
